spring:
  config:
    activate:
      on-profile: prod

# Applikationsspezifische Einstellungen
app:
  geoapify:
    apiKey: ${GEOAPIFY_KEY}
  seed:
    enabled: true
  states:
    api:
      key: ${CSC_API_KEY}
  server:
    port: ${SERVER_PORT}

  postgres:
    url: jdbc:postgresql://${POSTGRES_SQL_HOST}:${POSTGRES_SQL_PORT}/${POSTGRES_SQL_DB}?currentSchema=public
    username: ${POSTGRES_SQL_USERNAME}
    password: ${POSTGRES_SQL_PASSWORD}

  keys:
    path: ${KEYS_PATH}

  http2:
    enabled: ${HTTPS:true}

  ssl:
    enabled: false
